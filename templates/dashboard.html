<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STDAMS - Satellite Threat Detection</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1 class="neon-title">STDAMS <span>Satellite Threat Detection & Monitoring</span></h1>
        <div class="dashboard-cards">
            <div class="glass-card" id="telemetry-card">
                <h2>Live Telemetry</h2>
                <div class="telemetry-values">
                    <div>Altitude: <span id="altitude">--</span> km</div>
                    <div>Velocity: <span id="velocity">--</span> km/s</div>
                    <div>Signal: <span id="signal">--</span> %</div>
                </div>
            </div>
            <div class="glass-card" id="anomaly-card">
                <h2>Status</h2>
                <div id="status-indicator" class="status-normal">NORMAL</div>
                <div id="anomaly-score">Score: --</div>
            </div>
            <div class="glass-card" id="alert-card">
                <h2>Alerts</h2>
                <div id="alert-message">All systems normal.</div>
            </div>
        </div>
        <div class="glass-card chart-card">
            <canvas id="telemetryChart"></canvas>
        </div>
        <footer>
            <span>STDAMS &copy; 2026 | Skybit Team</span>
        </footer>
    </div>
    <script src="/static/chart.js"></script>
    <script>
        // Real-time data fetch and UI update
        let chart;
        let chartData = {
            labels: [],
            datasets: [
                { label: 'Altitude (km)', data: [], borderColor: '#00ffe7', backgroundColor: 'rgba(0,255,231,0.1)', yAxisID: 'y' },
                { label: 'Velocity (km/s)', data: [], borderColor: '#ff00c8', backgroundColor: 'rgba(255,0,200,0.1)', yAxisID: 'y1' },
                { label: 'Signal (%)', data: [], borderColor: '#ffe600', backgroundColor: 'rgba(255,230,0,0.1)', yAxisID: 'y2' }
            ]
        };
        function updateTelemetry() {
            fetch('/api/telemetry').then(r=>r.json()).then(data=>{
                if (!data) return;
                document.getElementById('altitude').textContent = data.altitude;
                document.getElementById('velocity').textContent = data.velocity;
                document.getElementById('signal').textContent = data.signal_strength;
                // Update chart
                chartData.labels.push(data.timestamp.split('T')[1].replace('Z',''));
                chartData.datasets[0].data.push(data.altitude);
                chartData.datasets[1].data.push(data.velocity);
                chartData.datasets[2].data.push(data.signal_strength);
                if (chartData.labels.length > 20) {
                    chartData.labels.shift();
                    chartData.datasets.forEach(ds=>ds.data.shift());
                }
                chart.update();
            });
        }
        function updateAnomaly() {
            fetch('/api/anomaly').then(r=>r.json()).then(data=>{
                let status = data.status || 'NO DATA';
                let score = data.score !== undefined ? data.score.toFixed(3) : '--';
                let indicator = document.getElementById('status-indicator');
                let card = document.getElementById('anomaly-card');
                indicator.textContent = status;
                indicator.className = status === 'ANOMALY' ? 'status-critical' : (status === 'NORMAL' ? 'status-normal' : 'status-warning');
                card.className = 'glass-card ' + (status === 'ANOMALY' ? 'card-critical' : (status === 'NORMAL' ? 'card-normal' : 'card-warning'));
                document.getElementById('anomaly-score').textContent = 'Score: ' + score;
            });
        }
        // Pehle ye line function ke upar (bahar) add karein taaki sound load ho jaye
const alertSound = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

function updateAlert() {
    fetch('/api/alerts').then(r=>r.json()).then(data=>{
        let msg = data.message || 'All systems normal.';
        let level = data.level || 'NORMAL';
        let alertCard = document.getElementById('alert-card');
        
        document.getElementById('alert-message').textContent = msg;
        alertCard.className = 'glass-card ' + (level === 'CRITICAL' ? 'card-critical' : (level === 'WARNING' ? 'card-warning' : 'card-normal'));

        // --- YAHAN HAI NAYA LOGIC ---
        // Agar level CRITICAL ya WARNING hai, toh beep bajao
        if (level === 'CRITICAL' || level === 'WARNING') {
            alertSound.play().catch(e => {
                console.log("Audio play block hua: Ek baar page par click karein!");
            });
        }
    });
}
        
        function refreshAll() {
            updateTelemetry();
            updateAnomaly();
            updateAlert();
        }
        window.onload = function() {
            const ctx = document.getElementById('telemetryChart').getContext('2d');
           chart = new Chart(ctx, {
    type: 'bar', // Yahan 'line' ki jagah 'bar' kar diya gaya hai
    data: chartData,
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: { labels: { color: '#fff', font: { size: 14 } } }
        },
        // Bars ki styling
        elements: {
            bar: {
                borderWidth: 2,
                borderRadius: 5, // Bars ke corners thode round rahenge
                borderSkipped: false
            }
        },
        scales: {
            y: { 
                type: 'linear', 
                position: 'left', 
                min: 340, 
                max: 460, 
                grid: { color: 'rgba(255,255,255,0.1)' }, 
                ticks: { color: '#FFA500' } 
            },
            y1: { 
                type: 'linear', 
                position: 'right', 
                min: 7, 
                max: 8.5, 
                grid: { display: false }, 
                ticks: { color: '#ff00c8' } 
            },
            y2: { 
                type: 'linear', 
                position: 'right', 
                min: 60, 
                max: 100, 
                grid: { display: false }, 
                ticks: { color: '#ffe600' } 
            }
        }
    }
}); 
            refreshAll();
            setInterval(refreshAll, 5000);
        }
    </script>
</body>
</html>
